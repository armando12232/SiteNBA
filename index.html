<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Props Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #00e676;
    --green-dim: rgba(0,230,118,0.12);
    --amber: #ffb300;
    --amber-dim: rgba(255,179,0,0.12);
    --red: #ff5252;
    --red-dim: rgba(255,82,82,0.12);
    --fire: #ff6d00;
    --fire-dim: rgba(255,109,0,0.12);
    --risk: #ff1744;
    --risk-dim: rgba(255,23,68,0.1);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  .app { max-width: 900px; margin: 0 auto; padding: 0 16px 80px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 24px 0 20px; border-bottom: 0.5px solid var(--border); margin-bottom: 24px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); text-transform: uppercase; }
  .live-pill { display: flex; align-items: center; gap: 6px; background: var(--green-dim); border: 0.5px solid var(--green); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-family: var(--mono); color: var(--green); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-right { font-size: 12px; font-family: var(--mono); color: var(--text3); }
  .update-info { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-top: 3px; text-align: right; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; padding: 14px; }
  .stat-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }

  /* API config */
  .api-bar { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .api-bar label { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .api-bar input { flex: 1; min-width: 200px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 6px; padding: 8px 12px; font-size: 12px; font-family: var(--mono); color: var(--text); outline: none; }
  .api-bar input:focus { border-color: var(--green); }
  .api-bar input::placeholder { color: var(--text3); }
  .btn { background: transparent; border: 0.5px solid var(--border2); border-radius: 6px; padding: 8px 16px; font-size: 12px; font-family: var(--mono); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg3); color: var(--text); border-color: var(--green); }
  .btn.active { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* Filters */
  .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 11px; font-family: var(--mono); color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text2); }
  .filter-btn.active { color: var(--text); border-color: var(--border2); background: var(--bg2); }
  .filter-btn.f-fire.active { color: var(--fire); border-color: var(--fire); background: var(--fire-dim); }
  .filter-btn.f-red.active { color: var(--red); border-color: var(--red); background: var(--red-dim); }
  .filter-btn.f-orange.active { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
  .filter-btn.f-yellow.active { color: #ffd54f; border-color: #ffd54f; background: rgba(255,213,79,0.1); }
  .filter-btn.f-risk.active { color: var(--risk); border-color: var(--risk); background: var(--risk-dim); }

  /* Alert cards */
  .alerts-list { display: flex; flex-direction: column; gap: 10px; }
  .alert-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color 0.2s; position: relative; overflow: hidden; }
  .alert-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 10px 0 0 10px; }
  .alert-card.fire::before { background: var(--fire); }
  .alert-card.red::before { background: var(--red); }
  .alert-card.orange::before { background: var(--amber); }
  .alert-card.yellow::before { background: #ffd54f; }
  .alert-card.risk { background: var(--risk-dim); border-color: rgba(255,23,68,0.3); }
  .alert-card.risk::before { background: var(--risk); }
  .alert-card:hover { border-color: var(--border2); }

  .alert-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .alert-player { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; font-family: var(--mono); }
  .avatar.fire { background: var(--fire-dim); color: var(--fire); border: 0.5px solid var(--fire); }
  .avatar.red { background: var(--red-dim); color: var(--red); border: 0.5px solid var(--red); }
  .avatar.orange { background: var(--amber-dim); color: var(--amber); border: 0.5px solid var(--amber); }
  .avatar.yellow { background: rgba(255,213,79,0.1); color: #ffd54f; border: 0.5px solid #ffd54f; }
  .avatar.risk { background: var(--risk-dim); color: var(--risk); border: 0.5px solid var(--risk); }

  .player-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .player-meta { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-top: 2px; }

  .alert-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { font-size: 10px; font-family: var(--mono); font-weight: 500; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .badge.fire { background: var(--fire-dim); color: var(--fire); border: 0.5px solid var(--fire); }
  .badge.red { background: var(--red-dim); color: var(--red); border: 0.5px solid var(--red); }
  .badge.orange { background: var(--amber-dim); color: var(--amber); border: 0.5px solid var(--amber); }
  .badge.yellow { background: rgba(255,213,79,0.1); color: #ffd54f; border: 0.5px solid #ffd54f; }
  .badge.warn { background: rgba(255,179,0,0.1); color: var(--amber); border: 0.5px solid rgba(255,179,0,0.3); }
  .badge.risk { background: var(--risk-dim); color: var(--risk); border: 0.5px solid var(--risk); }

  .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 6px; margin-bottom: 12px; }
  .stat-box { background: var(--bg3); border-radius: 6px; padding: 10px; }
  .stat-box-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-box-main { display: flex; align-items: baseline; gap: 5px; }
  .stat-box-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-box-proj { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .stat-box-pct { font-size: 11px; font-family: var(--mono); font-weight: 500; margin-top: 3px; }
  .stat-box-pct.up { color: var(--green); }
  .stat-box-pct.mid { color: var(--amber); }

  .alert-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 0.5px solid var(--border); flex-wrap: wrap; gap: 6px; }
  .line-info { font-size: 12px; font-family: var(--mono); color: var(--text3); }
  .line-info span { color: var(--text); font-weight: 500; }
  .game-score { font-size: 11px; font-family: var(--mono); color: var(--text3); }

  .risk-msg { font-size: 12px; font-family: var(--mono); color: var(--risk); margin: 8px 0; padding: 8px 10px; background: var(--risk-dim); border-radius: 5px; border-left: 2px solid var(--risk); }

  /* Empty / loading states */
  .state-box { text-align: center; padding: 48px 20px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; }
  .state-icon { font-size: 32px; margin-bottom: 12px; }
  .state-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
  .state-sub { font-size: 12px; font-family: var(--mono); color: var(--text3); line-height: 1.6; }

  /* Mobile */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .stats-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .alert-top { flex-direction: column; }
    .alert-badges { justify-content: flex-start; }
    .logo { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <span class="logo">NBA Props Monitor</span>
      <div class="live-pill"><div class="live-dot"></div>ao vivo</div>
    </div>
    <div>
      <div class="header-right" id="current-date">—</div>
      <div class="update-info" id="update-info">aguardando...</div>
    </div>
  </div>

  <div class="api-bar">
    <label>API Key</label>
    <input type="password" id="api-key-input" placeholder="Cole sua chave do BallDontLie aqui" />
    <button class="btn" id="start-btn" onclick="toggleMonitor()">Iniciar monitor</button>
    <button class="btn btn-sm" onclick="loadDemo()">Ver demo</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">jogos ao vivo</div>
      <div class="stat-value" id="stat-games">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">alertas ativos</div>
      <div class="stat-value green" id="stat-alerts">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">em risco</div>
      <div class="stat-value red" id="stat-risk">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">bloqueados</div>
      <div class="stat-value amber" id="stat-blocked">—</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="todos" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn f-fire" data-filter="fire" onclick="setFilter('fire',this)">Duplo/Triplo</button>
    <button class="filter-btn f-red" data-filter="red" onclick="setFilter('red',this)">3º quarto</button>
    <button class="filter-btn f-orange" data-filter="orange" onclick="setFilter('orange',this)">Intervalo</button>
    <button class="filter-btn f-yellow" data-filter="yellow" onclick="setFilter('yellow',this)">1º quarto</button>
    <button class="filter-btn f-risk" data-filter="risk" onclick="setFilter('risk',this)">Em risco</button>
  </div>

  <div class="alerts-list" id="alerts-list">
    <div class="state-box">
      <div class="state-icon">🏀</div>
      <div class="state-title">Monitor pausado</div>
      <div class="state-sub">Cole sua API key do BallDontLie e clique em "Iniciar monitor"<br>ou clique em "Ver demo" para ver como funciona</div>
    </div>
  </div>

</div>

<script>
const API_BASE = 'https://api.balldontlie.io';
let apiKey = '';
let monitorInterval = null;
let isRunning = false;
let currentFilter = 'todos';
let allAlerts = [];
let lastUpdate = null;

const BLOWOUT_THRESHOLD = 20;
const PACE_THRESHOLD = 1.5;

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
}

function getPriorityEmoji(type) {
  if (type === 'fire') return '🔥';
  if (type === 'red') return '🔴';
  if (type === 'orange') return '🟠';
  if (type === 'yellow') return '🟡';
  if (type === 'risk') return '⚠️';
  return '';
}

function getMomentLabel(type) {
  if (type === 'fire') return 'Duplo alerta';
  if (type === 'red') return '3º quarto';
  if (type === 'orange') return 'Intervalo';
  if (type === 'yellow') return '1º quarto';
  if (type === 'risk') return 'Em risco';
  return '';
}

function getPace(current, minutesPlayed, totalMinutes) {
  if (!minutesPlayed || minutesPlayed === 0) return 0;
  return (current / minutesPlayed) * totalMinutes;
}

function getMinutesFromPeriod(period, clock) {
  const periodMins = (period - 1) * 12;
  let clockMins = 12;
  if (clock) {
    const parts = clock.split(':');
    if (parts.length === 2) {
      clockMins = 12 - (parseInt(parts[0]) + parseInt(parts[1]) / 60);
    }
  }
  return periodMins + clockMins;
}

function getAlertType(period, clock) {
  if (!period) return null;
  if (period === 1) return 'yellow';
  if (period === 2) return 'orange';
  if (period >= 3) return 'red';
  return null;
}

async function fetchWithKey(url) {
  const res = await fetch(url, { headers: { Authorization: apiKey } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchLiveGames() {
  const today = new Date().toISOString().split('T')[0];
  const data = await fetchWithKey(`${API_BASE}/nba/v1/games?dates[]=${today}`);
  return (data.data || []).filter(g => g.status && g.status !== 'Final' && !g.status.includes('T'));
}

async function fetchSeasonAverages(playerIds) {
  if (!playerIds.length) return {};
  const season = new Date().getFullYear();
  const ids = playerIds.map(id => `player_ids[]=${id}`).join('&');
  const data = await fetchWithKey(`${API_BASE}/nba/v1/season_averages?season=${season}&${ids}`);
  const map = {};
  (data.data || []).forEach(p => { map[p.player_id] = p; });
  return map;
}

async function fetchGameStats(gameId) {
  const data = await fetchWithKey(`${API_BASE}/nba/v1/stats?game_ids[]=${gameId}`);
  return data.data || [];
}

async function fetchPlayerProps(gameId) {
  try {
    const data = await fetchWithKey(`${API_BASE}/nba/v1/player_props?game_id=${gameId}`);
    const map = {};
    (data.data || []).forEach(p => {
      if (!map[p.player_id]) map[p.player_id] = {};
      if (p.prop_type === 'points') map[p.player_id].pts_line = p.line_score;
      if (p.prop_type === 'rebounds') map[p.player_id].reb_line = p.line_score;
      if (p.prop_type === 'assists') map[p.player_id].ast_line = p.line_score;
    });
    return map;
  } catch { return {}; }
}

async function runMonitor() {
  if (!apiKey) return;
  try {
    lastUpdate = new Date();
    document.getElementById('update-info').textContent = `atualizado ${lastUpdate.toLocaleTimeString('pt-BR')}`;

    const liveGames = await fetchLiveGames();
    document.getElementById('stat-games').textContent = liveGames.length;

    if (!liveGames.length) {
      allAlerts = [];
      renderAlerts();
      updateStats();
      return;
    }

    const newAlerts = [];
    let blockedCount = 0;

    for (const game of liveGames) {
      const stats = await fetchGameStats(game.id);
      if (!stats.length) continue;

      const playerIds = stats.map(s => s.player?.id).filter(Boolean);
      const [averages, props] = await Promise.all([
        fetchSeasonAverages(playerIds),
        fetchPlayerProps(game.id)
      ]);

      const homeScore = game.home_team_score || 0;
      const awayScore = game.visitor_team_score || 0;
      const scoreDiff = Math.abs(homeScore - awayScore);
      const isBlowout = scoreDiff >= BLOWOUT_THRESHOLD;
      const period = game.period || 1;
      const clock = game.time || '';
      const minutesPlayed = getMinutesFromPeriod(period, clock);
      const totalMinutes = 48;

      for (const stat of stats) {
        const player = stat.player;
        const team = stat.team;
        if (!player || !team) continue;

        const avg = averages[player.id];
        if (!avg) continue;

        const isHomeTeam = team.id === game.home_team?.id;
        const teamScore = isHomeTeam ? homeScore : awayScore;
        const oppScore = isHomeTeam ? awayScore : homeScore;
        const teamIsWinning = teamScore > oppScore;
        const teamDiff = teamScore - oppScore;

        if (isBlowout && teamIsWinning) {
          blockedCount++;
          const existingRisk = allAlerts.find(a => a.playerId === player.id && a.type === 'risk');
          if (!existingRisk) {
            newAlerts.push({
              playerId: player.id,
              type: 'risk',
              name: `${player.first_name} ${player.last_name}`,
              team: team.abbreviation,
              position: player.position,
              currentPts: stat.pts || 0,
              currentReb: stat.reb || 0,
              currentAst: stat.ast || 0,
              ptsLine: props[player.id]?.pts_line,
              gameScore: `${game.visitor_team?.abbreviation} ${awayScore} · ${game.home_team?.abbreviation} ${homeScore}`,
              period,
              riskMsg: `Time ganhando por +${Math.abs(teamDiff)} pts — risco de banquinho no 4º quarto`,
              warnings: []
            });
          }
          continue;
        }

        const ptsPace = getPace(stat.pts || 0, minutesPlayed, totalMinutes);
        const rebPace = getPace(stat.reb || 0, minutesPlayed, totalMinutes);
        const astPace = getPace(stat.ast || 0, minutesPlayed, totalMinutes);

        const ptsRatio = avg.pts > 0 ? ptsPace / avg.pts : 0;
        const rebRatio = avg.reb > 0 ? rebPace / avg.reb : 0;
        const astRatio = avg.ast > 0 ? astPace / avg.ast : 0;

        const triggeredStats = [];
        if (ptsRatio >= PACE_THRESHOLD) triggeredStats.push({ stat: 'pts', current: stat.pts, proj: Math.round(ptsPace), avg: avg.pts, pct: Math.round(ptsRatio * 100), line: props[player.id]?.pts_line });
        if (rebRatio >= PACE_THRESHOLD) triggeredStats.push({ stat: 'reb', current: stat.reb, proj: Math.round(rebPace), avg: avg.reb, pct: Math.round(rebRatio * 100), line: props[player.id]?.reb_line });
        if (astRatio >= PACE_THRESHOLD) triggeredStats.push({ stat: 'ast', current: stat.ast, proj: Math.round(astPace), avg: avg.ast, pct: Math.round(astRatio * 100), line: props[player.id]?.ast_line });

        if (!triggeredStats.length) continue;

        let alertType = triggeredStats.length >= 2 ? 'fire' : getAlertType(period, clock);
        if (!alertType) continue;

        const warnings = [];
        if (stat.pf >= 3 && period <= 2) warnings.push(`${stat.pf} faltas`);
        if (stat.pf >= 4 && period === 3) warnings.push(`${stat.pf} faltas`);
        if (isBlowout && !teamIsWinning) warnings.push('adversário em blowout');

        newAlerts.push({
          playerId: player.id,
          type: alertType,
          name: `${player.first_name} ${player.last_name}`,
          team: team.abbreviation,
          position: player.position,
          triggeredStats,
          currentPts: stat.pts || 0,
          currentReb: stat.reb || 0,
          currentAst: stat.ast || 0,
          gameScore: `${game.visitor_team?.abbreviation} ${awayScore} · ${game.home_team?.abbreviation} ${homeScore}`,
          period,
          warnings
        });
      }
    }

    allAlerts = newAlerts;
    blockedCount += newAlerts.filter(a => a.type === 'risk').length;
    document.getElementById('stat-blocked').textContent = blockedCount;
    renderAlerts();
    updateStats();

  } catch (err) {
    console.error(err);
    document.getElementById('update-info').textContent = 'erro ao atualizar — verifique a API key';
  }
}

function updateStats() {
  const active = allAlerts.filter(a => a.type !== 'risk').length;
  const risk = allAlerts.filter(a => a.type === 'risk').length;
  document.getElementById('stat-alerts').textContent = active;
  document.getElementById('stat-risk').textContent = risk;
}

function renderAlerts() {
  const list = document.getElementById('alerts-list');
  const filtered = currentFilter === 'todos' ? allAlerts : allAlerts.filter(a => a.type === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="state-box"><div class="state-icon">✓</div><div class="state-title">Nenhum alerta ${currentFilter !== 'todos' ? 'nessa categoria' : 'no momento'}</div><div class="state-sub">Monitor ativo — verificando a cada 5 minutos</div></div>`;
    return;
  }

  const order = { fire: 0, red: 1, orange: 2, yellow: 3, risk: 4 };
  const sorted = [...filtered].sort((a, b) => (order[a.type] ?? 9) - (order[b.type] ?? 9));

  list.innerHTML = sorted.map(a => renderCard(a)).join('');
}

function renderCard(a) {
  const initials = getInitials(a.name);
  const momentLabel = getMomentLabel(a.type);

  if (a.type === 'risk') {
    return `
    <div class="alert-card risk">
      <div class="alert-top">
        <div class="alert-player">
          <div class="avatar risk">${initials}</div>
          <div>
            <div class="player-name">${a.name}</div>
            <div class="player-meta">${a.team} · ${a.position || '—'}</div>
          </div>
        </div>
        <div class="alert-badges"><span class="badge risk">⚠ Em risco</span></div>
      </div>
      <div class="risk-msg">${a.riskMsg}</div>
      <div class="alert-footer">
        <div class="line-info">Pts: <span>${a.currentPts}</span> · Reb: <span>${a.currentReb}</span> · Ast: <span>${a.currentAst}</span></div>
        <div class="game-score">${a.gameScore} · Q${a.period}</div>
      </div>
    </div>`;
  }

  const statsHTML = (a.triggeredStats || []).map(s => {
    const label = s.stat === 'pts' ? 'Pontos' : s.stat === 'reb' ? 'Rebotes' : 'Assistências';
    const pctClass = s.pct >= 180 ? 'up' : 'mid';
    return `
    <div class="stat-box">
      <div class="stat-box-label">${label}</div>
      <div class="stat-box-main">
        <span class="stat-box-val">${s.current}</span>
        <span class="stat-box-proj">proj ${s.proj}</span>
      </div>
      <div class="stat-box-pct ${pctClass}">+${s.pct}% da média</div>
    </div>`;
  }).join('');

  const allStats = ['pts','reb','ast'].filter(s => !(a.triggeredStats||[]).find(t=>t.stat===s));
  const extraStats = allStats.map(s => {
    const label = s === 'pts' ? 'Pontos' : s === 'reb' ? 'Rebotes' : 'Assistências';
    const val = s === 'pts' ? a.currentPts : s === 'reb' ? a.currentReb : a.currentAst;
    return `
    <div class="stat-box">
      <div class="stat-box-label">${label}</div>
      <div class="stat-box-main"><span class="stat-box-val">${val}</span></div>
      <div class="stat-box-pct" style="color:var(--text3)">—</div>
    </div>`;
  }).join('');

  const warningBadges = (a.warnings||[]).map(w => `<span class="badge warn">⚠ ${w}</span>`).join('');
  const lines = (a.triggeredStats||[]).filter(s=>s.line).map(s => {
    const label = s.stat === 'pts' ? 'pts' : s.stat === 'reb' ? 'reb' : 'ast';
    return `Linha ${label}: <span>${s.line}</span>`;
  }).join(' &nbsp;·&nbsp; ');

  return `
  <div class="alert-card ${a.type}">
    <div class="alert-top">
      <div class="alert-player">
        <div class="avatar ${a.type}">${initials}</div>
        <div>
          <div class="player-name">${a.name}</div>
          <div class="player-meta">${a.team} · ${a.position || '—'}</div>
        </div>
      </div>
      <div class="alert-badges">
        <span class="badge ${a.type}">${momentLabel}</span>
        ${warningBadges}
      </div>
    </div>
    <div class="stats-grid">${statsHTML}${extraStats}</div>
    <div class="alert-footer">
      <div class="line-info">${lines || '—'}</div>
      <div class="game-score">${a.gameScore} · Q${a.period}</div>
    </div>
  </div>`;
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAlerts();
}

function toggleMonitor() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key && !isRunning) {
    document.getElementById('api-key-input').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('api-key-input').style.borderColor = '', 2000);
    return;
  }

  if (isRunning) {
    clearInterval(monitorInterval);
    isRunning = false;
    document.getElementById('start-btn').textContent = 'Iniciar monitor';
    document.getElementById('start-btn').classList.remove('active');
    document.getElementById('update-info').textContent = 'monitor pausado';
    return;
  }

  apiKey = key;
  isRunning = true;
  document.getElementById('start-btn').textContent = 'Parar monitor';
  document.getElementById('start-btn').classList.add('active');
  runMonitor();
  monitorInterval = setInterval(runMonitor, 5 * 60 * 1000);
}
