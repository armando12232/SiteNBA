<!-- FAST FRONT -->
<script>
const PREGAME_PLAYERS = [
  {id:203999},
  {id:1628983},
  {id:1628384}
];

async function loadPregame(){
  const results=[]
  for(const p of PREGAME_PLAYERS){
    try{
      const r=await fetch(`/api/nba?type=pregame&playerId=${p.id}`).then(r=>r.json())
      results.push(r)
    }catch(e){console.error(e)}
  }
  console.log(results)
}
loadPregame()
</script>
