<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatCast BR — Admin</title>
<style>
  :root {
    --bg:     #080808;
    --bg2:    #111111;
    --bg3:    #1a1a1a;
    --bg4:    #222222;
    --border: #1f1f1f;
    --border2:#2a2a2a;
    --text:   #f0f0f0;
    --text2:  #aaaaaa;
    --text3:  #555555;
    --gold:   #fdb927;
    --green:  #00e676;
    --red:    #ff1744;
    --amber:  #ffd600;
    --blue:   #4fc3f7;
    --display:'Barlow Condensed', sans-serif;
    --body:   'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }
  
  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; width: 360px;
  }
  .login-title { font-family: var(--display); font-size: 28px; font-weight: 900; margin-bottom: 4px; }
  .login-sub { font-size: 12px; color: var(--text3); margin-bottom: 28px; }
  .inp { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px;
    padding: 12px 14px; font-size: 14px; color: var(--text); font-family: var(--body); margin-bottom: 12px; }
  .inp:focus { outline: none; border-color: var(--gold); }
  .btn-primary { width: 100%; background: var(--gold); color: #000; border: none;
    border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 800;
    cursor: pointer; font-family: var(--body); margin-top: 4px; }
  .btn-primary:hover { opacity: .88; }
  .login-err { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  /* DASHBOARD */
  #dashboard { display: none; }
  
  /* HEADER */
  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 56px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-family: var(--display); font-size: 20px; font-weight: 900; }
  .header-logo span { color: var(--gold); }
  .admin-badge { background: rgba(255,23,68,.15); color: var(--red); border: 1px solid rgba(255,23,68,.3);
    border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 800; letter-spacing: .1em; }
  .header-user { font-size: 12px; color: var(--text3); }
  .btn-logout { background: none; border: 1px solid var(--border2); color: var(--text3);
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: var(--body); }
  .btn-logout:hover { color: var(--text); border-color: var(--border); }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
  
  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .metric-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
  .metric-value { font-family: var(--display); font-size: 36px; font-weight: 900; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .metric-card.green .metric-value { color: var(--green); }
  .metric-card.gold .metric-value { color: var(--gold); }
  .metric-card.blue .metric-value { color: var(--blue); }
  .metric-card.red .metric-value { color: var(--red); }

  /* SECTION */
  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
  .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
  .section-body { padding: 16px 20px; }

  /* TABLE */
  .table { width: 100%; border-collapse: collapse; }
  .table th { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--bg3); }

  /* PLAN BADGE */
  .plan-pill { border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
  .plan-pill.free    { background: rgba(85,85,85,.2); color: #888; border: 1px solid #333; }
  .plan-pill.basic   { background: rgba(253,185,39,.15); color: var(--gold); border: 1px solid rgba(253,185,39,.3); }
  .plan-pill.pro     { background: rgba(0,230,118,.15); color: var(--green); border: 1px solid rgba(0,230,118,.3); }
  .plan-pill.premium { background: rgba(79,195,247,.15); color: var(--blue); border: 1px solid rgba(79,195,247,.3); }

  /* PLAN SELECT */
  .plan-select { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 5px 8px; font-size: 12px; font-family: var(--body); cursor: pointer; }
  .plan-select:focus { outline: none; border-color: var(--gold); }

  /* BTN SAVE */
  .btn-save { background: var(--green); color: #000; border: none; border-radius: 8px; padding: 5px 12px; font-size: 11px; font-weight: 800; cursor: pointer; font-family: var(--body); }
  .btn-save:hover { opacity: .85; }
  .btn-save:disabled { opacity: .4; cursor: default; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--green); color: var(--green);
    padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 700;
    z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,.5); display: none; }

  /* LOADING */
  .loading { color: var(--text3); font-size: 13px; padding: 20px; text-align: center; }

  @media (max-width: 700px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">StatCast <span>BR</span></div>
    <div class="login-sub">Painel de Administrador</div>
    <input class="inp" id="adm-email" type="email" placeholder="Email" />
    <input class="inp" id="adm-pass" type="password" placeholder="Senha" />
    <button class="btn-primary" onclick="adminLogin()">Entrar</button>
    <div class="login-err" id="login-err">Email/senha inválidos ou sem permissão de admin.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="header-logo">StatCast <span>BR</span></div>
      <div class="admin-badge">ADMIN</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="header-user" id="admin-email-display"></div>
      <button class="btn-logout" onclick="adminLogout()">Sair</button>
    </div>
  </div>

  <div class="container">

    <!-- MÉTRICAS -->
    <div class="metrics-grid" id="metrics-grid">
      <div class="metric-card green">
        <div class="metric-label">Total Usuários</div>
        <div class="metric-value" id="m-total">—</div>
        <div class="metric-sub">registrados</div>
      </div>
      <div class="metric-card gold">
        <div class="metric-label">Pagantes</div>
        <div class="metric-value" id="m-paid">—</div>
        <div class="metric-sub">basic + pro + premium</div>
      </div>
      <div class="metric-card blue">
        <div class="metric-label">Receita Mensal</div>
        <div class="metric-value" id="m-mrr">—</div>
        <div class="metric-sub">MRR estimado</div>
      </div>
      <div class="metric-card red">
        <div class="metric-label">Free</div>
        <div class="metric-value" id="m-free">—</div>
        <div class="metric-sub">conversão pendente</div>
      </div>
    </div>

    <!-- DISTRIBUIÇÃO DE PLANOS -->
    <div class="section" style="margin-bottom:20px">
      <div class="section-header">
        <div class="section-title">📊 Distribuição de Planos</div>
      </div>
      <div class="section-body" id="plan-dist">
        <div class="loading">Carregando...</div>
      </div>
    </div>

    <!-- USUÁRIOS -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">👥 Usuários</div>
        <input id="search-users" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 12px;font-size:12px;font-family:var(--body);width:200px" placeholder="Buscar email..." oninput="filterUsers(this.value)" />
      </div>
      <div class="section-body" style="padding:0;overflow-x:auto">
        <div id="users-table-wrap">
          <div class="loading">Carregando usuários...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dhirxfoxcswctxcjzvhf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DC3I02jLVjM013WrODpgCg_xiPl1rsl';
const PLAN_PRICES  = { free: 0, basic: 29, pro: 59, premium: 99 };

let accessToken = null;
let allUsers    = [];

// ─── AUTH ──────────────────────────────────────────────────────────────────
async function adminLogin() {
  const email = document.getElementById('adm-email').value.trim();
  const pass  = document.getElementById('adm-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pass }),
  });
  const data = await res.json();
  if (!data.access_token) { errEl.style.display = 'block'; return; }

  accessToken = data.access_token;

  // Verificar se é admin usando service key
  const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoaXJ4Zm94Y3N3Y3R4Y2p6dmhmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTQxMjk2MCwiZXhwIjoyMDkwOTg4OTYwfQ.2v0U5_IXg9oQrFc-LI4Ke4D5wPhb6Wzs70_PE8PIpuY';
  
  // Buscar user_id via token do usuário
  const meRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
  });
  const me = await meRes.json();
  const userId = me?.id;
  if (!userId) { errEl.style.display = 'block'; return; }

  // Verificar role com service key (bypassa RLS)
  const subRes = await fetch(`${SUPABASE_URL}/rest/v1/subscriptions?select=role&user_id=eq.${userId}&limit=1`, {
    headers: { 'apikey': SERVICE_KEY, 'Authorization': `Bearer ${SERVICE_KEY}` }
  });
  const sub = await subRes.json();
  if (!sub?.[0] || sub[0].role !== 'admin') {
    errEl.style.display = 'block';
    accessToken = null;
    return;
  }
  window._SERVICE_KEY = SERVICE_KEY;

  document.getElementById('admin-email-display').textContent = email;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadDashboard();
}

function adminLogout() {
  accessToken = null;
  allUsers = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

// ─── CARREGAR DADOS ────────────────────────────────────────────────────────
async function loadDashboard() {
  const SK = window._SERVICE_KEY;
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/subscriptions?select=user_id,plan,status,role,created_at`,
    { headers: { 'apikey': SK, 'Authorization': `Bearer ${SK}` } }
  );
  const subs = await res.json();

  // Buscar emails dos usuários
  const emailRes = await fetch(`${SUPABASE_URL}/auth/v1/admin/users`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
  });

  let emailMap = {};
  if (emailRes.ok) {
    const eData = await emailRes.json();
    (eData.users || []).forEach(u => { emailMap[u.id] = u.email; });
  }

  allUsers = subs.map(s => ({
    ...s,
    email: emailMap[s.user_id] || s.user_id.slice(0, 8) + '...',
  }));

  renderMetrics(allUsers);
  renderPlanDist(allUsers);
  renderUsersTable(allUsers);
}

// ─── MÉTRICAS ─────────────────────────────────────────────────────────────
function renderMetrics(users) {
  const total  = users.length;
  const paid   = users.filter(u => u.plan !== 'free').length;
  const free   = users.filter(u => u.plan === 'free').length;
  const mrr    = users.reduce((s, u) => s + (PLAN_PRICES[u.plan] || 0), 0);

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-paid').textContent  = paid;
  document.getElementById('m-free').textContent  = free;
  document.getElementById('m-mrr').textContent   = `R$${mrr}`;
}

// ─── DISTRIBUIÇÃO ─────────────────────────────────────────────────────────
function renderPlanDist(users) {
  const counts = { free: 0, basic: 0, pro: 0, premium: 0 };
  users.forEach(u => { counts[u.plan] = (counts[u.plan] || 0) + 1; });
  const total = users.length || 1;
  const colors = { free: '#555', basic: '#fdb927', pro: '#00e676', premium: '#4fc3f7' };

  document.getElementById('plan-dist').innerHTML = Object.entries(counts).map(([plan, count]) => {
    const pct = Math.round((count / total) * 100);
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:${colors[plan]};font-weight:700;text-transform:uppercase;letter-spacing:.06em">${plan}</span>
          <span style="color:var(--text2)">${count} usuário${count !== 1 ? 's' : ''} · ${pct}%</span>
        </div>
        <div style="background:var(--bg4);border-radius:4px;height:6px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${colors[plan]};border-radius:4px;transition:width .6s ease"></div>
        </div>
      </div>`;
  }).join('');
}

// ─── TABELA DE USUÁRIOS ───────────────────────────────────────────────────
function renderUsersTable(users) {
  if (!users.length) {
    document.getElementById('users-table-wrap').innerHTML = '<div class="loading">Nenhum usuário encontrado.</div>';
    return;
  }
  document.getElementById('users-table-wrap').innerHTML = `
    <table class="table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Plano atual</th>
          <th>Status</th>
          <th>Role</th>
          <th>Desde</th>
          <th>Alterar plano</th>
        </tr>
      </thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td style="font-size:13px;color:var(--text2)">${u.email}</td>
            <td><span class="plan-pill ${u.plan}">${u.plan}</span></td>
            <td style="color:${u.status === 'active' ? 'var(--green)' : 'var(--text3)'};font-size:12px">${u.status}</td>
            <td style="color:${u.role === 'admin' ? 'var(--red)' : 'var(--text3)'};font-size:12px;font-weight:700">${u.role}</td>
            <td style="font-size:12px;color:var(--text3)">${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <select class="plan-select" id="sel-${u.user_id}" onchange="markDirty('${u.user_id}')">
                  <option value="free"    ${u.plan==='free'    ? 'selected':''}>Free</option>
                  <option value="basic"   ${u.plan==='basic'   ? 'selected':''}>Basic</option>
                  <option value="pro"     ${u.plan==='pro'     ? 'selected':''}>Pro</option>
                  <option value="premium" ${u.plan==='premium' ? 'selected':''}>Premium</option>
                </select>
                <button class="btn-save" id="save-${u.user_id}" onclick="savePlan('${u.user_id}')" disabled>Salvar</button>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function filterUsers(q) {
  const filtered = q
    ? allUsers.filter(u => u.email.toLowerCase().includes(q.toLowerCase()))
    : allUsers;
  renderUsersTable(filtered);
}

function markDirty(userId) {
  document.getElementById(`save-${userId}`).disabled = false;
}

// ─── ALTERAR PLANO ─────────────────────────────────────────────────────────
async function savePlan(userId) {
  const select = document.getElementById(`sel-${userId}`);
  const btn    = document.getElementById(`save-${userId}`);
  const plan   = select.value;
  btn.textContent = '...';
  btn.disabled = true;

  const SK = window._SERVICE_KEY;
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/subscriptions?user_id=eq.${userId}`,
    {
      method: 'PATCH',
      headers: {
        'apikey': SK,
        'Authorization': `Bearer ${SK}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ plan, status: 'active' }),
    }
  );

  if (res.ok) {
    // Atualizar localmente
    const u = allUsers.find(u => u.user_id === userId);
    if (u) u.plan = plan;
    showToast(`✅ Plano de ${u?.email || 'usuário'} atualizado para ${plan}!`);
    renderMetrics(allUsers);
    renderPlanDist(allUsers);
    // Atualizar badge da linha
    const row = select.closest('tr');
    if (row) {
      const badge = row.querySelector('.plan-pill');
      if (badge) { badge.className = `plan-pill ${plan}`; badge.textContent = plan; }
    }
  } else {
    showToast('❌ Erro ao atualizar plano.', 'red');
    btn.textContent = 'Salvar';
    btn.disabled = false;
  }
}

// ─── TOAST ────────────────────────────────────────────────────────────────
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--green)';
  t.style.color = color || 'var(--green)';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

// Enter para login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    adminLogin();
  }
});
</script>
</body>
</html>
